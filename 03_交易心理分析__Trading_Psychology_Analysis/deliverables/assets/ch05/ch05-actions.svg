<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#FAFFF8"/>

    <text x="120" y="105" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#48663B">行动清单</text>
    <text x="120" y="150" font-size="28" font-family="Microsoft YaHei" fill="#486581">把本章道理压缩成可以直接执行的动作。</text>
    <rect x="110" y="190" width="1300" height="560" rx="42" fill="#E7F2E3" opacity="0.72"/>
    
      <circle cx="195" cy="193" r="42" fill="#8AB17D"/>
      <text x="195" y="203" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">1</text>
      <rect x="260" y="147" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="213" font-size="28" font-family="Microsoft YaHei" fill="#243b53">遇到强烈情绪时，先问：这是当前行情，还是旧经验在说话？</text>
      <circle cx="195" cy="343" r="42" fill="#8AB17D"/>
      <text x="195" y="353" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">2</text>
      <rect x="260" y="297" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="363" font-size="28" font-family="Microsoft YaHei" fill="#243b53">复盘时记录‘我当时看到了什么’，而不是只记录结果。</text>
      <circle cx="195" cy="493" r="42" fill="#8AB17D"/>
      <text x="195" y="503" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">3</text>
      <rect x="260" y="447" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="513" font-size="28" font-family="Microsoft YaHei" fill="#243b53">定期回看自己曾经完全看不懂、现在已经能看懂的图，</text><text x="340" y="543" font-size="28" font-family="Microsoft YaHei" fill="#243b53">提醒自己认知可以被扩展。</text>
      <circle cx="195" cy="643" r="42" fill="#8AB17D"/>
      <text x="195" y="653" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">4</text>
      <rect x="260" y="597" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="663" font-size="28" font-family="Microsoft YaHei" fill="#243b53">把常见触发词写出来：害怕、报复、证明、想翻本，</text><text x="340" y="693" font-size="28" font-family="Microsoft YaHei" fill="#243b53">找到它们背后的旧故事。</text>
  
</svg>