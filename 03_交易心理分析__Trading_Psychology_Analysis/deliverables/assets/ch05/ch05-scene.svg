    <text x="920" y="722" font-size="30" font-family="Microsoft YaHei" fill="#1f2933">第 5 章解释了认知是怎样工作的。你看到的市场，从来不是纯粹客观的市场，而是被过往记忆、痛苦回避、联想系统过滤后的市场版本。很多交易错误不是技术错误，而是感知错误。</text>
  
