    <text x="930" y="280" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">行情每时每刻都在更新，但人的大脑总想用旧故事给新场景贴标签。</text><text x="930" y="328" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">你不是只在看图，你是在用记忆解释图。</text>
