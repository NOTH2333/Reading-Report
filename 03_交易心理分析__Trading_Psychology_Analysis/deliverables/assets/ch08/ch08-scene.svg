    <text x="920" y="722" font-size="30" font-family="Microsoft YaHei" fill="#1f2933">第 8 章开始从原理走向安装。作者不再只是讲‘应该怎么想’，而是说明交易者究竟要把哪些基本事实放进自己的信念结构里，并把这些事实转成可运作的技巧与状态。</text>
  
