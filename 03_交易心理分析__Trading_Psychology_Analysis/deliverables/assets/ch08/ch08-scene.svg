    <text x="930" y="280" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">信念不是口号，而是大脑默认会怎么解释世界、怎么行动的底层说明书。</text><text x="930" y="328" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">第 8 章就在教你怎样重写说明书。</text>
