<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#FFF8FA"/>

    <rect x="80" y="60" width="1440" height="780" rx="40" fill="#ffffff" opacity="0.94"/>
    <text x="120" y="140" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#6E2C39">本章概念地图</text>
    <text x="120" y="190" font-size="28" font-family="Microsoft YaHei" fill="#486581">把书里的抽象术语翻成能看得见的关系图。</text>
    <line x1="800" y1="170" x2="480" y2="340" stroke="#B56576" stroke-width="8" opacity="0.35"/><line x1="800" y1="170" x2="1120" y2="340" stroke="#B56576" stroke-width="8" opacity="0.35"/><line x1="480" y1="340" x2="500" y2="610" stroke="#B56576" stroke-width="8" opacity="0.35"/><line x1="1120" y1="340" x2="1100" y2="610" stroke="#B56576" stroke-width="8" opacity="0.35"/>
    
      <circle cx="800" cy="170" r="92" fill="#ffffff" stroke="#B56576" stroke-width="6"/>
      <text x="800" y="160" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#6E2C39">五个基本事实</text>
      <text x="800" y="222" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">关于风险、独特时刻、随机结果与优势的基础真相。</text>
      <circle cx="480" cy="340" r="92" fill="#ffffff" stroke="#355070" stroke-width="6"/>
      <text x="480" y="330" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#6E2C39">安装信念</text>
      <text x="480" y="392" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">让新观点不只是懂了，而是真的能自动工作。</text>
      <circle cx="1120" cy="340" r="92" fill="#ffffff" stroke="#355070" stroke-width="6"/>
      <text x="1120" y="330" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#6E2C39">技巧</text>
      <text x="1120" y="392" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">把信念变成行动习惯的桥梁。</text>
      <circle cx="500" cy="610" r="92" fill="#ffffff" stroke="#355070" stroke-width="6"/>
      <text x="500" y="600" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#6E2C39">状态</text>
      <text x="500" y="662" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">当新信念开始稳定运行时出现的轻松、专注与流动感。</text>
      <circle cx="1100" cy="610" r="92" fill="#ffffff" stroke="#355070" stroke-width="6"/>
      <text x="1100" y="600" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#6E2C39">冲突解除</text>
      <text x="1100" y="662" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">清掉旧信念与新原则之间的内在拉扯。</text>
  
</svg>