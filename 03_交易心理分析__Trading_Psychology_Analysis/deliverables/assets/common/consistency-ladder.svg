<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F8FBFF"/>

    <text x="120" y="110" font-size="50" font-family="Microsoft YaHei" font-weight="700" fill="#355070">从读懂到做到的一致性阶梯</text>
    <text x="120" y="155" font-size="28" font-family="Microsoft YaHei" fill="#486581">全书真正的成长路径，不是“看准更多”，而是“思维结构越来越匹配市场”。</text>
    
      <rect x="640" y="650" width="320" height="78" rx="24" fill="#D8F1EC" stroke="#355070" stroke-width="3"/>
      <text x="800" y="697" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#1f2933">认识到问题不只在分析，更在心理结构</text>
      <rect x="565" y="540" width="470" height="78" rx="24" fill="#FCE4CC" stroke="#355070" stroke-width="3"/>
      <text x="800" y="587" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#1f2933">接受市场不确定且每个样本独立</text>
      <rect x="490" y="430" width="620" height="78" rx="24" fill="#E7F2E3" stroke="#355070" stroke-width="3"/>
      <text x="800" y="477" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#1f2933">建立与事实匹配的信念</text>
      <rect x="415" y="320" width="770" height="78" rx="24" fill="#E6DDEA" stroke="#355070" stroke-width="3"/>
      <text x="800" y="367" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#1f2933">用规则和练习把信念变成动作</text>
      <rect x="340" y="210" width="920" height="78" rx="24" fill="#DDE6EF" stroke="#355070" stroke-width="3"/>
      <text x="800" y="257" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#1f2933">在长期样本中形成一致性</text>
  
</svg>