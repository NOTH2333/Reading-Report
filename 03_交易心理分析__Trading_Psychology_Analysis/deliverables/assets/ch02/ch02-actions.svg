<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#FFF8F1"/>

    <text x="120" y="105" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#8B4E1B">行动清单</text>
    <text x="120" y="150" font-size="28" font-family="Microsoft YaHei" fill="#486581">把本章道理压缩成可以直接执行的动作。</text>
    <rect x="110" y="190" width="1300" height="560" rx="42" fill="#FCE4CC" opacity="0.72"/>
    
      <circle cx="195" cy="193" r="42" fill="#F4A261"/>
      <text x="195" y="203" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">1</text>
      <rect x="260" y="147" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="213" font-size="28" font-family="Microsoft YaHei" fill="#243b53">交易前先回答：我想要的是刺激，还是想做一门可重复的事业？</text>
      <circle cx="195" cy="343" r="42" fill="#F4A261"/>
      <text x="195" y="353" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">2</text>
      <rect x="260" y="297" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="363" font-size="28" font-family="Microsoft YaHei" fill="#243b53">把入场、止损、止盈和停手条件写成固定句子。</text>
      <circle cx="195" cy="493" r="42" fill="#F4A261"/>
      <text x="195" y="503" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">3</text>
      <rect x="260" y="447" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="513" font-size="28" font-family="Microsoft YaHei" fill="#243b53">记录每次冲动单的触发原因，找出自己最常见的诱惑按钮。</text>
      <circle cx="195" cy="643" r="42" fill="#F4A261"/>
      <text x="195" y="653" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">4</text>
      <rect x="260" y="597" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="663" font-size="28" font-family="Microsoft YaHei" fill="#243b53">每天复盘时优先评价“是否守规则”，再评价“是否赚钱”。</text>
  
</svg>