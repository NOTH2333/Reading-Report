    <text x="930" y="280" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">交易像一间装满奖品的游戏屋，门永远开着；</text><text x="930" y="328" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">但它又像一座没有护栏的桥，任何一步失控都可能摔下去。</text>
    <rect x="880" y="610" width="520" height="150" rx="34" fill="#F4A261" opacity="0.12"/>
    <text x="920" y="670" font-size="36" font-family="Microsoft YaHei" font-weight="700" fill="#8B4E1B">本章主线</text>
    <text x="920" y="722" font-size="30" font-family="Microsoft YaHei" fill="#1f2933">第 2 章专门拆解交易最迷人的地方，也正是它最危险的地方：市场给了人几乎无限的表达自由，但大多数人并没有准备好在无边界的环境里为自己负责。</text>
  
