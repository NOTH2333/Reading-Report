<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F6FAFF"/>

    <text x="110" y="100" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#1F3045">误区与修正</text>
    <text x="110" y="145" font-size="28" font-family="Microsoft YaHei" fill="#486581">把“听上去很像对的话”翻回书里真正的意思。</text>
    
      <rect x="110" y="180" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="180" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="252" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">像交易者一样思考，就是把自己训练成没有感觉的机器。</text>
      <text x="865" y="252" font-size="28" font-family="Microsoft YaHei" fill="#14532d">作者追求的不是麻木，而是让正确原则在有感觉时也能继续工作。</text>
      <path d="M710 248 L790 248" stroke="#355070" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 226 L798 248 L772 270" fill="none" stroke="#355070" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="370" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="370" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="442" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">机械阶段太死板，会让我失去灵活性。</text>
      <text x="865" y="442" font-size="28" font-family="Microsoft YaHei" fill="#14532d">机械阶段是过渡训练，目的是先校正旧习惯，</text><text x="865" y="476" font-size="28" font-family="Microsoft YaHei" fill="#14532d">之后灵活性才有健康基础。</text>
      <path d="M710 438 L790 438" stroke="#355070" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 416 L798 438 L772 460" fill="none" stroke="#355070" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="560" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="560" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="632" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">读懂这些道理以后，我应该很快就完全改变。</text>
      <text x="865" y="632" font-size="28" font-family="Microsoft YaHei" fill="#14532d">真正改变靠重复、练习和自我观察，不靠单次领悟。</text>
      <path d="M710 628 L790 628" stroke="#355070" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 606 L798 628 L772 650" fill="none" stroke="#355070" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
</svg>