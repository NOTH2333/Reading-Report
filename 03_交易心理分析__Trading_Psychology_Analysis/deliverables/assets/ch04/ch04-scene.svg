    <text x="920" y="670" font-size="36" font-family="Microsoft YaHei" font-weight="700" fill="#17313B">本章主线</text>
    <text x="920" y="722" font-size="30" font-family="Microsoft YaHei" fill="#1f2933">第 4 章把作者的立场说得非常明确：稳定盈利先是一种思想状态，然后才表现为一系列看起来很有纪律的动作。没有合适的状态，再好的规则也会被你自己改坏。</text>
  
