    <text x="930" y="280" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">一致性不是永远不摇摆，而是每次摇摆后都能回到中心，</text><text x="930" y="328" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">不被上一次的输赢拖着走。</text>
