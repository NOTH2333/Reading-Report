<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#FFF9F3"/>

    <text x="110" y="100" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#6A3B14">误区与修正</text>
    <text x="110" y="145" font-size="28" font-family="Microsoft YaHei" fill="#486581">把“听上去很像对的话”翻回书里真正的意思。</text>
    
      <rect x="110" y="180" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="180" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="252" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">我下错单只是因为一时没看清图。</text>
      <text x="865" y="252" font-size="28" font-family="Microsoft YaHei" fill="#14532d">很多‘没看清’，其实是某个信念先决定了你想看见什么、不想看见什么。</text>
      <path d="M710 248 L790 248" stroke="#BC6C25" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 226 L798 248 L772 270" fill="none" stroke="#BC6C25" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="370" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="370" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="442" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">对自己评价高一点，总归是好事。</text>
      <text x="865" y="442" font-size="28" font-family="Microsoft YaHei" fill="#14532d">健康自信有帮助，但过度绑定自我形象，</text><text x="865" y="476" font-size="28" font-family="Microsoft YaHei" fill="#14532d">会让你更难承认错误、也更难接受亏损。</text>
      <path d="M710 438 L790 438" stroke="#BC6C25" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 416 L798 438 L772 460" fill="none" stroke="#BC6C25" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="560" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="560" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="632" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">只要把规则贴在屏幕旁边，我就会照着做。</text>
      <text x="865" y="632" font-size="28" font-family="Microsoft YaHei" fill="#14532d">如果规则和内在信念冲突，真正做决定的往往还是后者。</text>
      <path d="M710 628 L790 628" stroke="#BC6C25" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 606 L798 628 L772 650" fill="none" stroke="#BC6C25" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
</svg>