<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7FBFF"/>

    <text x="110" y="100" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#2D4255">误区与修正</text>
    <text x="110" y="145" font-size="28" font-family="Microsoft YaHei" fill="#486581">把“听上去很像对的话”翻回书里真正的意思。</text>
    
      <rect x="110" y="180" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="180" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="252" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">这次图形和上次很像，所以结果应该也一样。</text>
      <text x="865" y="252" font-size="28" font-family="Microsoft YaHei" fill="#14532d">相似只意味着有优势，不意味着结果复制。</text><text x="865" y="286" font-size="28" font-family="Microsoft YaHei" fill="#14532d">市场每个时刻仍然是新的。</text>
      <path d="M710 248 L790 248" stroke="#577590" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 226 L798 248 L772 270" fill="none" stroke="#577590" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="370" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="370" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="442" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">我连输几笔，下一笔大概率该轮到我赢了。</text>
      <text x="865" y="442" font-size="28" font-family="Microsoft YaHei" fill="#14532d">市场不会因为安慰你而调概率，单笔结果仍是独立展开的。</text>
      <path d="M710 438 L790 438" stroke="#577590" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 416 L798 438 L772 460" fill="none" stroke="#577590" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="560" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="560" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="632" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">市场故意针对我。</text>
      <text x="865" y="632" font-size="28" font-family="Microsoft YaHei" fill="#14532d">市场没有人格，没有情绪，它只是在流动。</text><text x="865" y="666" font-size="28" font-family="Microsoft YaHei" fill="#14532d">把它个人化，只会放大你的痛苦。</text>
      <path d="M710 628 L790 628" stroke="#577590" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 606 L798 628 L772 650" fill="none" stroke="#577590" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
</svg>