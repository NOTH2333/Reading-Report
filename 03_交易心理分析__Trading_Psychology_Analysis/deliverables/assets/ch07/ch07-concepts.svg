<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#FFFDF4"/>

    <rect x="80" y="60" width="1440" height="780" rx="40" fill="#ffffff" opacity="0.94"/>
    <text x="120" y="140" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#866A1C">本章概念地图</text>
    <text x="120" y="190" font-size="28" font-family="Microsoft YaHei" fill="#486581">把书里的抽象术语翻成能看得见的关系图。</text>
    <line x1="800" y1="170" x2="480" y2="340" stroke="#E9C46A" stroke-width="8" opacity="0.35"/><line x1="800" y1="170" x2="1120" y2="340" stroke="#E9C46A" stroke-width="8" opacity="0.35"/><line x1="480" y1="340" x2="500" y2="610" stroke="#E9C46A" stroke-width="8" opacity="0.35"/><line x1="1120" y1="340" x2="1100" y2="610" stroke="#E9C46A" stroke-width="8" opacity="0.35"/>
    
      <circle cx="800" cy="170" r="92" fill="#ffffff" stroke="#E9C46A" stroke-width="6"/>
      <text x="800" y="160" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#866A1C">优势</text>
      <text x="800" y="222" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">在足够多样本中，让某种结果概率更高的条件。</text>
      <circle cx="480" cy="340" r="92" fill="#ffffff" stroke="#2A9D8F" stroke-width="6"/>
      <text x="480" y="330" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#866A1C">概率悖论</text>
      <text x="480" y="392" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">单次随机，却能长期稳定。</text>
      <circle cx="1120" cy="340" r="92" fill="#ffffff" stroke="#2A9D8F" stroke-width="6"/>
      <text x="1120" y="330" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#866A1C">当下交易</text>
      <text x="1120" y="392" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">不把过去和未来的情绪塞进当前决策。</text>
      <circle cx="500" cy="610" r="92" fill="#ffffff" stroke="#2A9D8F" stroke-width="6"/>
      <text x="500" y="600" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#866A1C">预期管理</text>
      <text x="500" y="662" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">只期待执行优势，不期待单笔一定成功。</text>
      <circle cx="1100" cy="610" r="92" fill="#ffffff" stroke="#2A9D8F" stroke-width="6"/>
      <text x="1100" y="600" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#866A1C">情绪风险</text>
      <text x="1100" y="662" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">不是市场波动本身，而是你对波动的心理扭曲。</text>
  
</svg>