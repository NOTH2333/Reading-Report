    <text x="930" y="280" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">赌场不需要每一把都赢，但它清楚知道规则给了自己长期优势。</text><text x="930" y="328" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">成熟交易者也应如此：尊重单次随机，依靠长期统计。</text>
    <rect x="880" y="610" width="520" height="150" rx="34" fill="#E9C46A" opacity="0.12"/>
    <text x="920" y="670" font-size="36" font-family="Microsoft YaHei" font-weight="700" fill="#866A1C">本章主线</text>
    <text x="920" y="722" font-size="30" font-family="Microsoft YaHei" fill="#1f2933">第 7 章是全书的核心。作者借赌场的例子说明：单笔结果可以随机，但只要你真正拥有优势，并且持续执行，长期结果就会稳定向优势倾斜。问题不是市场不给你答案，而是你常常在样本还没积累前就被情绪改写了规则。</text>
  
