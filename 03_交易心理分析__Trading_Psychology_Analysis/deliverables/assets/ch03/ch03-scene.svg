        <rect x="150" y="610" width="190" height="62" rx="20" fill="#ffffff" opacity="0.92"/>
        <text x="245" y="649" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#243b53">方向盘</text>
        <rect x="380" y="610" width="190" height="62" rx="20" fill="#ffffff" opacity="0.92"/>
        <text x="475" y="649" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#243b53">后视镜</text>
        <rect x="150" y="704" width="190" height="62" rx="20" fill="#ffffff" opacity="0.92"/>
        <text x="245" y="743" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#243b53">责任</text>
        <rect x="380" y="704" width="190" height="62" rx="20" fill="#ffffff" opacity="0.92"/>
        <text x="475" y="743" text-anchor="middle" font-size="28" font-family="Microsoft YaHei" fill="#243b53">路线修正</text>
    <rect x="820" y="180" width="650" height="360" rx="40" fill="#ffffff" opacity="0.92" stroke="#2A9D8F" stroke-width="6"/>
    <text x="930" y="280" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">承担责任，不是给自己加重负，而是承认方向盘本来就在你手上。</text><text x="930" y="328" font-size="34" font-family="Microsoft YaHei" fill="#1f2933">只有承认这一点，你才知道该修的是车、路感和驾驶习惯。</text>
    <rect x="880" y="610" width="520" height="150" rx="34" fill="#2A9D8F" opacity="0.12"/>
    <text x="920" y="670" font-size="36" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">本章主线</text>
    <text x="920" y="722" font-size="30" font-family="Microsoft YaHei" fill="#1f2933">第 3 章说明，责任不是嘴上承认“亏了是我的”，而是把自己的心理环境重新整理到一个能接受风险、能从结果里学习、而不是不断自我防御的状态。</text>
  
