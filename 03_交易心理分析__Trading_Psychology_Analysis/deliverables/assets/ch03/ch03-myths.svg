<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F4FFFD"/>

    <text x="110" y="100" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">误区与修正</text>
    <text x="110" y="145" font-size="28" font-family="Microsoft YaHei" fill="#486581">把“听上去很像对的话”翻回书里真正的意思。</text>
    
      <rect x="110" y="180" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="180" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="220" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="252" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">承担责任就是不停责怪自己。</text>
      <text x="865" y="252" font-size="28" font-family="Microsoft YaHei" fill="#14532d">责任的重点是拥有改进权，而不是制造羞耻感。</text><text x="865" y="286" font-size="28" font-family="Microsoft YaHei" fill="#14532d">自责会让你缩小，责任会让你开始修正。</text>
      <path d="M710 248 L790 248" stroke="#2A9D8F" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 226 L798 248 L772 270" fill="none" stroke="#2A9D8F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="370" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="370" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="410" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="442" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">只要我很想赢，我就能逼市场给我答案。</text>
      <text x="865" y="442" font-size="28" font-family="Microsoft YaHei" fill="#14532d">市场不回应意志力，它只回应群体行为。</text><text x="865" y="476" font-size="28" font-family="Microsoft YaHei" fill="#14532d">你真正能改变的是自己的反应系统。</text>
      <path d="M710 438 L790 438" stroke="#2A9D8F" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 416 L798 438 L772 460" fill="none" stroke="#2A9D8F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="110" y="560" width="580" height="136" rx="28" fill="#FEE2E2"/>
      <rect x="810" y="560" width="580" height="136" rx="28" fill="#DCFCE7"/>
      <text x="155" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#991B1B">常见误区</text>
      <text x="855" y="600" font-size="26" font-family="Microsoft YaHei" font-weight="700" fill="#166534">作者真正想说</text>
      <text x="175" y="632" font-size="28" font-family="Microsoft YaHei" fill="#7f1d1d">大赚过说明我已经是赢家。</text>
      <text x="865" y="632" font-size="28" font-family="Microsoft YaHei" fill="#14532d">没有稳定结构的大赚，常常只是情绪放大的副产物，</text><text x="865" y="666" font-size="28" font-family="Microsoft YaHei" fill="#14532d">不能代表长期能力。</text>
      <path d="M710 628 L790 628" stroke="#2A9D8F" stroke-width="8" stroke-linecap="round"/>
      <path d="M772 606 L798 628 L772 650" fill="none" stroke="#2A9D8F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
</svg>