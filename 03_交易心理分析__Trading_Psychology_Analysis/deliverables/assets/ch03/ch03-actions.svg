<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F4FFFD"/>

    <text x="120" y="105" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">行动清单</text>
    <text x="120" y="150" font-size="28" font-family="Microsoft YaHei" fill="#486581">把本章道理压缩成可以直接执行的动作。</text>
    <rect x="110" y="190" width="1300" height="560" rx="42" fill="#D8F1EC" opacity="0.72"/>
    
      <circle cx="195" cy="193" r="42" fill="#2A9D8F"/>
      <text x="195" y="203" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">1</text>
      <rect x="260" y="147" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="213" font-size="28" font-family="Microsoft YaHei" fill="#243b53">复盘时把“市场害我”改写成“我当时做了什么选择”。</text>
      <circle cx="195" cy="343" r="42" fill="#2A9D8F"/>
      <text x="195" y="353" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">2</text>
      <rect x="260" y="297" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="363" font-size="28" font-family="Microsoft YaHei" fill="#243b53">每次亏损后记录：我是在学习，还是在捍卫自尊？</text>
      <circle cx="195" cy="493" r="42" fill="#2A9D8F"/>
      <text x="195" y="503" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">3</text>
      <rect x="260" y="447" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="513" font-size="28" font-family="Microsoft YaHei" fill="#243b53">把一次交易拆成可控部分和不可控部分，避免把不可控结果人格化。</text>
      <circle cx="195" cy="643" r="42" fill="#2A9D8F"/>
      <text x="195" y="653" text-anchor="middle" font-size="34" font-family="Georgia" font-weight="700" fill="#ffffff">4</text>
      <rect x="260" y="597" width="1080" height="102" rx="30" fill="#ffffff" opacity="0.92"/>
      <text x="340" y="663" font-size="28" font-family="Microsoft YaHei" fill="#243b53">对大赚和大亏同样做流程复盘，防止把运气当实力。</text>
  
</svg>