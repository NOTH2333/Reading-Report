<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F4FFFD"/>

    <rect x="80" y="60" width="1440" height="780" rx="40" fill="#ffffff" opacity="0.94"/>
    <text x="120" y="140" font-size="46" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">本章概念地图</text>
    <text x="120" y="190" font-size="28" font-family="Microsoft YaHei" fill="#486581">把书里的抽象术语翻成能看得见的关系图。</text>
    <line x1="800" y1="170" x2="480" y2="340" stroke="#2A9D8F" stroke-width="8" opacity="0.35"/><line x1="800" y1="170" x2="1120" y2="340" stroke="#2A9D8F" stroke-width="8" opacity="0.35"/><line x1="480" y1="340" x2="500" y2="610" stroke="#2A9D8F" stroke-width="8" opacity="0.35"/><line x1="1120" y1="340" x2="1100" y2="610" stroke="#2A9D8F" stroke-width="8" opacity="0.35"/>
    
      <circle cx="800" cy="170" r="92" fill="#ffffff" stroke="#2A9D8F" stroke-width="6"/>
      <text x="800" y="160" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">责任</text>
      <text x="800" y="222" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">承认选择由自己完成，结果可被学习，</text><text x="800" y="250" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">而不是只被抱怨。</text>
      <circle cx="480" cy="340" r="92" fill="#ffffff" stroke="#E9C46A" stroke-width="6"/>
      <text x="480" y="330" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">心理环境</text>
      <text x="480" y="392" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">你怎样解释市场、亏损和自己行为的内部空间。</text>
      <circle cx="1120" cy="340" r="92" fill="#ffffff" stroke="#E9C46A" stroke-width="6"/>
      <text x="1120" y="330" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">防御反应</text>
      <text x="1120" y="392" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">为了保护自我形象，自动回避痛苦信息。</text>
      <circle cx="500" cy="610" r="92" fill="#ffffff" stroke="#E9C46A" stroke-width="6"/>
      <text x="500" y="600" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">赢家与崩溃者</text>
      <text x="500" y="662" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">同样会赢，但有人靠结构累积，</text><text x="500" y="690" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">有人靠情绪失控后爆掉。</text>
      <circle cx="1100" cy="610" r="92" fill="#ffffff" stroke="#E9C46A" stroke-width="6"/>
      <text x="1100" y="600" text-anchor="middle" font-size="30" font-family="Microsoft YaHei" font-weight="700" fill="#165B53">自我最佳利益</text>
      <text x="1100" y="662" text-anchor="middle" font-size="22" font-family="Microsoft YaHei" fill="#334e68">不是当下舒服，而是长期对自己最有利。</text>
  
</svg>