<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#F7F1E6"/><rect x="46" y="40" width="92" height="34" rx="17" fill="#0F766E" stroke="#0F766E" stroke-width="0"/><text x="92.0" y="63" fill="#ffffff" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="18" font-weight="700" text-anchor="middle">第02章</text><text x="150" y="66" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="30" font-weight="800" text-anchor="start">道氏理论</text><rect x="390" y="255" width="420" height="180" rx="30" fill="#FFF8EE" stroke="#1D4ED8" stroke-width="4"/><text x="600" y="320" fill="#1D4ED8" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="34" font-weight="800" text-anchor="middle">道氏理论</text><text x="600" y="365" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="22" font-weight="500" text-anchor="middle">道氏理论像趋势分析的祖先，它教人先分</text><text x="600" y="395" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="22" font-weight="500" text-anchor="middle">清大浪、中浪和小浪，再决定自己到底在</text><text x="600" y="425" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="22" font-weight="500" text-anchor="middle">和谁交易。</text><line x1="600" y1="350" x2="600" y2="110" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/><polygon points="600,110 607.0,122.12435565298215 593.0,122.12435565298215" fill="#1D4ED8"/><rect x="485" y="62" width="230" height="96" rx="24" fill="#FFFDF8" stroke="#0F766E" stroke-width="3"/><text x="600" y="106" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="22" font-weight="500" text-anchor="middle">三种趋势</text><line x1="600" y1="350" x2="920" y2="210" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/><polygon points="920,210 911.6979144756956,221.27277144038388 906.0864507994196,208.44656875175323" fill="#1D4ED8"/><rect x="805" y="162" width="230" height="96" rx="24" fill="#FFFDF8" stroke="#0F766E" stroke-width="3"/><text x="920" y="206" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="22" font-weight="500" text-anchor="middle">主要趋势的阶段</text><line x1="600" y1="350" x2="920" y2="490" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/><polygon points="920,490 906.0864507994196,491.5534312482468 911.6979144756956,478.72722855961615" fill="#1D4ED8"/><rect x="805" y="442" width="230" height="96" rx="24" fill="#FFFDF8" stroke="#0F766E" stroke-width="3"/><text x="920" y="486" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="22" font-weight="500" text-anchor="middle">相互验证原则</text><line x1="600" y1="350" x2="600" y2="590" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/><polygon points="600,590 593.0,577.8756443470179 607.0,577.8756443470179" fill="#1D4ED8"/><rect x="485" y="542" width="230" height="96" rx="24" fill="#FFFDF8" stroke="#0F766E" stroke-width="3"/><text x="600" y="586" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="22" font-weight="500" text-anchor="middle">趋势持续直到反转</text></svg>