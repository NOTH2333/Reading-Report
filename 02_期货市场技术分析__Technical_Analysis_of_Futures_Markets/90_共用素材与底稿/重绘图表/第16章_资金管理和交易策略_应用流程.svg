<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#F7F1E6"/><rect x="46" y="40" width="92" height="34" rx="17" fill="#0F766E" stroke="#0F766E" stroke-width="0"/><text x="92.0" y="63" fill="#ffffff" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="18" font-weight="700" text-anchor="middle">应用流程</text><text x="170" y="66" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="30" font-weight="800" text-anchor="start">资金管理和交易策略</text><circle cx="110" cy="150" r="34" fill="#FFF8EE" stroke="#C84C31" stroke-width="4"/><text x="110" y="158" fill="#C84C31" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="28" font-weight="800" text-anchor="middle">1</text><rect x="180" y="108" width="860" height="84" rx="24" fill="#FFFDF8" stroke="#D9CCB8" stroke-width="2"/><text x="220" y="146" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="24" font-weight="500" text-anchor="start">先用趋势、形态和指标判断方向与时机。</text><line x1="110" y1="184" x2="110" y2="236" stroke="#C84C31" stroke-width="4" stroke-linecap="round"/><polygon points="110,236 103.0,223.87564434701787 117.0,223.87564434701787" fill="#C84C31"/><circle cx="110" cy="280" r="34" fill="#FFF8EE" stroke="#C84C31" stroke-width="4"/><text x="110" y="288" fill="#C84C31" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="28" font-weight="800" text-anchor="middle">2</text><rect x="180" y="238" width="860" height="84" rx="24" fill="#FFFDF8" stroke="#D9CCB8" stroke-width="2"/><text x="220" y="276" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="24" font-weight="500" text-anchor="start">进场前先写出止损位、目标位和单笔允许亏损。</text><line x1="110" y1="314" x2="110" y2="366" stroke="#C84C31" stroke-width="4" stroke-linecap="round"/><polygon points="110,366 103.0,353.87564434701784 117.0,353.87564434701784" fill="#C84C31"/><circle cx="110" cy="410" r="34" fill="#FFF8EE" stroke="#C84C31" stroke-width="4"/><text x="110" y="418" fill="#C84C31" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="28" font-weight="800" text-anchor="middle">3</text><rect x="180" y="368" width="860" height="84" rx="24" fill="#FFFDF8" stroke="#D9CCB8" stroke-width="2"/><text x="220" y="406" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="24" font-weight="500" text-anchor="start">根据账户规模决定仓位，而不是根据兴奋程度决定仓位</text><text x="220" y="438" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="24" font-weight="500" text-anchor="start">。</text><line x1="110" y1="444" x2="110" y2="496" stroke="#C84C31" stroke-width="4" stroke-linecap="round"/><polygon points="110,496 103.0,483.87564434701784 117.0,483.87564434701784" fill="#C84C31"/><circle cx="110" cy="540" r="34" fill="#FFF8EE" stroke="#C84C31" stroke-width="4"/><text x="110" y="548" fill="#C84C31" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="28" font-weight="800" text-anchor="middle">4</text><rect x="180" y="498" width="860" height="84" rx="24" fill="#FFFDF8" stroke="#D9CCB8" stroke-width="2"/><text x="220" y="536" fill="#253238" font-family="Microsoft YaHei, 'Noto Sans SC', sans-serif" font-size="24" font-weight="500" text-anchor="start">定期复盘自己的流程是否稳定、一致、可重复。</text></svg>